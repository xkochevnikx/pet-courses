# Bot + Payload CMS на стенде (svt-staging.ru → 127.0.0.1:3001).
# Вставить ВЫШЕ location / { ... }.
#
# Next.js на :3000: /api/auth/, /api/trpc/
# Бот на :3001:   /admin, /oauth/, Payload /api/*

# --- Payload Admin ---
location ^~ /admin {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    proxy_connect_timeout 30s;
    proxy_read_timeout 120s;
}

# --- Payload REST API (коллекции бота; не трогаем Next /api/auth и /api/trpc) ---
location ^~ /api/users {
    proxy_pass http://127.0.0.1:3001;
    proxy_http_version 1.1;
