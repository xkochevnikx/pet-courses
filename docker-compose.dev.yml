services:
  # =========================
  # Dev-override поверх docker-compose.yml
  # =========================
  # Только отличия от базового файла. db, minio, createbuckets, mongo, bot, volumes, ports,
  # depends_on — из docker-compose.yml. Списки (ports, volumes) в dev не дублируем:
  # Compose склеивает их, а не заменяет → EADDRINUSE.

  web:
    image: node:20-alpine
    container_name: web-dev

    command: >
      sh -lc "
        echo '[web-dev] npm install (mount volume)...';
        npm install --no-audit --no-fund;

        echo '[web-dev] Prisma migrate...';
        npx prisma migrate deploy || npx prisma db push;

        echo '[web-dev] start dev server';
        npm run dev
      "

    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/postgres
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
      S3_PUBLIC_URL: http://localhost:9000/images
      MINIO_INTERNAL_BASE: http://minio:9000/images
      NEXTAUTH_URL: http://localhost:3000
      PORT: ${PORT:-3000}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
